<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUT SPIN — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700; --gold2: #FFA500;
    --dark: #0a0a0f; --card: #1a1a28;
    --accent: #00e5ff; --red: #ff3366;
    --text: #e8e8f0; --muted: #6b6b8a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--dark); color: var(--text);
    font-family: 'Barlow', sans-serif; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(255,50,100,0.08) 0%, transparent 60%);
  }
  .container { width:100%; max-width:400px; padding:24px; }
  .logo {
    font-family: 'Bebas Neue', sans-serif; font-size:2.8rem;
    letter-spacing:4px; text-align:center; margin-bottom:4px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .badge {
    display:block; text-align:center; font-size:0.7rem; letter-spacing:4px;
    text-transform:uppercase; color:var(--red); margin-bottom:36px; font-weight:700;
  }
  .card {
    background: var(--card); border:1px solid rgba(255,50,100,0.2);
    border-radius:20px; padding:36px;
  }
  .form-group { margin-bottom:20px; }
  label { display:block; font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  input {
    width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
    border-radius:10px; padding:14px 16px; color:var(--text); font-size:1rem;
    font-family:'Barlow',sans-serif; transition:border-color .2s;
  }
  input:focus { outline:none; border-color:var(--red); }
  .btn {
    width:100%; padding:16px; border:none; border-radius:12px; cursor:pointer;
    font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:3px;
    background:linear-gradient(135deg, var(--red), #c0002a); color:#fff;
    margin-top:8px; transition:opacity .2s;
  }
  .btn:hover { opacity:.85; }
  .error {
    background:rgba(255,51,102,0.12); border:1px solid rgba(255,51,102,0.3);
    border-radius:10px; padding:12px 16px; margin-bottom:20px;
    font-size:0.9rem; color:var(--red);
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">FUT SPIN</div>
  <span class="badge">⚙ Pannello Amministratore</span>
  <div class="card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Username Admin</label>
        <input type="text" name="username" autocomplete="off" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn">ACCEDI</button>
    </form>
  </div>
</div>
</body>
</html>
